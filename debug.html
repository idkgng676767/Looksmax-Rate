<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Face Debug</title>
<style>
body{background:#111;color:#0f0;font-family:monospace;padding:20px;white-space:pre-wrap;font-size:13px;line-height:1.6;}
h2{color:#f00;margin:10px 0;}
.btn{background:#222;color:#0f0;border:1px solid #0f0;padding:10px 20px;cursor:pointer;margin:10px 0;font-family:monospace;font-size:14px;}
.btn:hover{background:#0f0;color:#000;}
#out{margin-top:20px;}
</style>
</head>
<body>
<h2>FACE METRICS DEBUGGER</h2>
<input type="file" id="file" accept="image/*" class="btn">
<div id="out">Select an image to analyze...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
const LM={jawLeft:234,jawRight:454,chin:152,jawMidLeft:172,jawMidRight:397,leftEyeOuter:33,leftEyeInner:133,leftEyeTop:159,leftEyeBot:145,rightEyeOuter:362,rightEyeInner:263,rightEyeTop:386,rightEyeBot:374,noseTip:1,noseLeft:129,noseRight:358,noseBridge:6,leftBrowOuter:70,leftBrowInner:107,rightBrowOuter:300,rightBrowInner:336,lipTop:13,lipBot:14,lipLeft:61,lipRight:291,lipUpperMid:12,lipLowerMid:15,cheekLeft:116,cheekRight:345,foreheadTop:10};

const out=document.getElementById('out');
const fileInput=document.getElementById('file');

let faceMesh=null;
async function init(){
  faceMesh=new FaceMesh({locateFile:f=>'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.3,minTrackingConfidence:0.3});
  faceMesh.onResults(onResults);
  await faceMesh.initialize();
  out.textContent='Engine ready. Select an image.';
}
init();

let resolveDetection=null;
function onResults(r){if(resolveDetection){resolveDetection(r);resolveDetection=null;}}

async function detect(img){
  return new Promise((res,rej)=>{
    resolveDetection=res;
    const t=setTimeout(()=>{resolveDetection=null;rej(new Error('timeout'));},15000);
    faceMesh.send({image:img}).catch(e=>{clearTimeout(t);resolveDetection=null;rej(e);}).then(()=>clearTimeout(t));
  });
}

fileInput.onchange=async e=>{
  const file=e.target.files[0];
  if(!file)return;
  const img=new Image();
  img.onload=async()=>{
    out.textContent='Analyzing...';
    try{
      const r=await detect(img);
      if(!r.multiFaceLandmarks||!r.multiFaceLandmarks.length){out.textContent='NO FACE DETECTED';return;}
      const lm=r.multiFaceLandmarks[0];
      const p=i=>({x:lm[i].x,y:lm[i].y});
      const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

      // Rotate to upright
      const le=p(33),re=p(362);
      const eyeAngle=Math.atan2(re.y-le.y,re.x-le.x);
      const cosA=Math.cos(-eyeAngle),sinA=Math.sin(-eyeAngle);
      const eyeMid={x:(le.x+re.x)/2,y:(le.y+re.y)/2};
      const rp=i=>{const pt=p(i);const dx=pt.x-eyeMid.x,dy=pt.y-eyeMid.y;return {x:dx*cosA-dy*sinA+eyeMid.x,y:dx*sinA+dy*cosA+eyeMid.y};};

      const faceW=dist(rp(234),rp(454));
      const faceH=dist(rp(10),rp(152));
      const fRatio=faceH/faceW;

      // Symmetry
      const nb=rp(6);
      const pairs=[['eyeOuter',33,362],['eyeInner',133,263],['browOuter',70,300],['browInner',107,336],['nose',129,358],['lip',61,291],['jaw',234,454],['cheek',116,345]];
      let symDevs=[],symDetails='';
      pairs.forEach(([name,l,r])=>{
        const a=rp(l),b=rp(r);
        const idealRx=2*nb.x-a.x;
        const dev=Math.abs(b.x-idealRx)/faceW;
        symDevs.push(dev);
        symDetails+=name+': dev='+(dev*100).toFixed(2)+'%  L.x='+a.x.toFixed(4)+' R.x='+b.x.toFixed(4)+' idealR='+idealRx.toFixed(4)+'\n';
      });
      const symAvg=symDevs.reduce((a,b)=>a+b,0)/symDevs.length;

      // Canthal
      const lO=rp(33),lI=rp(133),rO=rp(362),rI=rp(263);
      const lEW=dist(lO,lI),rEW=dist(rO,rI);
      const tR=(((lO.y-lI.y)/lEW)+((rO.y-rI.y)/rEW))/2;

      // Eye
      const lEH=dist(rp(159),rp(145)),rEH=dist(rp(386),rp(374));
      const eR=(lEH/lEW+rEH/rEW)/2;

      // Cheek
      const cheekW=dist(rp(116),rp(345)),jawW=dist(rp(172),rp(397));
      const cRatio=cheekW/jawW;

      // Thirds
      const browY=(rp(107).y+rp(336).y)/2;
      const t1=browY-rp(10).y,t2=rp(1).y-browY,t3=rp(152).y-rp(1).y;
      const tot=t1+t2+t3,ideal=tot/3;
      const thirdsDev=(Math.abs(t1-ideal)+Math.abs(t2-ideal)+Math.abs(t3-ideal))/tot;

      // Nose
      const noseW=dist(rp(129),rp(358)),ieW=dist(rp(133),rp(263));
      const nRatio=noseW/ieW;

      // Lips
      const _upH=dist(rp(13),rp(12)),_loH=dist(rp(14),rp(15));
      const _lipRatio=_upH/_loH;

      // Now compute scores with current formulas
      const jaw=Math.max(22,Math.min(96,Math.round(90-Math.abs(fRatio-1.35)*55)));
      const sym=Math.max(30,Math.min(98,Math.round(100-symAvg*1500)));
      let cScore=72;
      if(tR<-0.05)cScore=85;else if(tR>=0.03)cScore=48;
      const chk=Math.max(18,Math.min(94,Math.round(45+(cRatio-0.85)*50)));
      const eye=Math.max(18,Math.min(94,Math.round(-200*Math.pow(eR-0.3,2)+90)));
      const thirds=Math.max(40,Math.min(96,Math.round(100-thirdsDev*100)));
      const nose=Math.max(30,Math.min(96,Math.round(100-Math.pow(nRatio-1.1,2)*200)));
      const lips=Math.max(20,Math.min(94,Math.round(100-Math.pow(_lipRatio-0.6,2)*420)));
      const w=jaw*0.21+sym*0.18+cScore*0.17+chk*0.14+eye*0.12+thirds*0.10+nose*0.05+lips*0.03;
      const score=(Math.max(2,Math.min(9.7,w*0.084+1.1))).toFixed(1);

      let txt='====== RAW VALUES =====\n';
      txt+='eyeAngle: '+(eyeAngle*180/Math.PI).toFixed(2)+' deg\n';
      txt+='faceW: '+faceW.toFixed(5)+' faceH: '+faceH.toFixed(5)+' fRatio: '+fRatio.toFixed(4)+'\n\n';
      txt+='--- SYMMETRY ---\n';
      txt+=symDetails;
      txt+='symAvg: '+(symAvg*100).toFixed(2)+'% of faceW\n\n';
      txt+='--- CANTHAL TILT ---\n';
      txt+='tR: '+tR.toFixed(5)+' (neg=positive tilt)\n';
      txt+='L tilt: '+((lO.y-lI.y)/lEW).toFixed(5)+' R tilt: '+((rO.y-rI.y)/rEW).toFixed(5)+'\n\n';
      txt+='--- EYE ---\n';
      txt+='eR (aspect ratio): '+eR.toFixed(4)+' (L:'+(lEH/lEW).toFixed(4)+' R:'+(rEH/rEW).toFixed(4)+')\n\n';
      txt+='--- CHEEKBONES ---\n';
      txt+='cRatio (cheekW/jawW): '+cRatio.toFixed(4)+'\n\n';
      txt+='--- FACIAL THIRDS ---\n';
      txt+='t1: '+t1.toFixed(5)+' t2: '+t2.toFixed(5)+' t3: '+t3.toFixed(5)+'\n';
      txt+='tot: '+tot.toFixed(5)+' ideal: '+ideal.toFixed(5)+' thirdsDev: '+thirdsDev.toFixed(5)+'\n\n';
      txt+='--- NOSE ---\n';
      txt+='nRatio (noseW/ieW): '+nRatio.toFixed(4)+'\n\n';
      txt+='--- LIPS ---\n';
      txt+='lipRatio (upH/loH): '+_lipRatio.toFixed(4)+'\n\n';
      txt+='====== SCORES =====\n';
      txt+='jaw: '+jaw+' sym: '+sym+' canthal: '+cScore+' chk: '+chk+'\n';
      txt+='eye: '+eye+' thirds: '+thirds+' nose: '+nose+' lips: '+lips+'\n';
      txt+='weighted w: '+w.toFixed(1)+' → FINAL SCORE: '+score+'/10\n';
      txt+='====================\n';

      out.textContent=txt;
    }catch(err){
      out.textContent='ERROR: '+err.message;
    }
  };
  img.src=URL.createObjectURL(file);
};
</script>
</body>
</html>
