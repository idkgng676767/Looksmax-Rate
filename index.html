
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
'use strict';
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

setInterval(()=>$('ts').textContent=new Date().toISOString().replace('T',' ').slice(0,19),1000);
$('ts').textContent=new Date().toISOString().replace('T',' ').slice(0,19);

let ready=false,faceMesh=null;
let lastLandmarks=null,originalLandmarks=null,uploadedDataURL=null;

async function initMediaPipe(){
  const st=$('st');
  try{
    faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.3,minTrackingConfidence:0.3});
    faceMesh.onResults(onResults);
    await faceMesh.initialize();
    ready=true;st.textContent='ONLINE';st.className='on';
    $('dt').textContent='DRAG PHOTO / CLICK';
    $('dl').innerHTML='<strong style="color:var(--red);font-size:.95rem;letter-spacing:2px">DRAG PHOTO / CLICK</strong><br>front-facing photo<br>no filters or glasses<br><br><span style="color:#1e1e1e">JPG / PNG / WEBP</span>';
  }catch(e){st.textContent='ERR: '+e.message.slice(0,30);st.className='er';}
}

let resolveDetection=null;
function onResults(results){if(resolveDetection){resolveDetection(results);resolveDetection=null;}}

function detectFace(imgEl){
  return new Promise((resolve,reject)=>{
    resolveDetection=resolve;
    const t=setTimeout(()=>{resolveDetection=null;reject(new Error('timeout'));},15000);
    faceMesh.send({image:imgEl}).catch(e=>{clearTimeout(t);resolveDetection=null;reject(e);}).then(()=>clearTimeout(t));
  });
}

const LM={jawLeft:234,jawRight:454,chin:152,jawMidLeft:172,jawMidRight:397,leftEyeOuter:33,leftEyeInner:133,leftEyeTop:159,leftEyeBot:145,rightEyeOuter:362,rightEyeInner:263,rightEyeTop:386,rightEyeBot:374,noseTip:1,noseLeft:129,noseRight:358,noseBridge:6,leftBrowOuter:70,leftBrowInner:107,rightBrowOuter:300,rightBrowInner:336,lipTop:13,lipBot:14,lipLeft:61,lipRight:291,lipUpperMid:12,lipLowerMid:15,cheekLeft:116,cheekRight:345,foreheadTop:10};

const KEY_LANDMARKS=[
  {idx:LM.jawLeft,label:'JAW LEFT'},{idx:LM.jawRight,label:'JAW RIGHT'},{idx:LM.chin,label:'CHIN'},
  {idx:LM.jawMidLeft,label:'JAW MID L'},{idx:LM.jawMidRight,label:'JAW MID R'},
  {idx:LM.leftEyeOuter,label:'EYE OUT L'},{idx:LM.leftEyeInner,label:'EYE IN L'},
  {idx:LM.leftEyeTop,label:'EYE TOP L'},{idx:LM.leftEyeBot,label:'EYE BOT L'},
  {idx:LM.rightEyeOuter,label:'EYE OUT R'},{idx:LM.rightEyeInner,label:'EYE IN R'},
  {idx:LM.rightEyeTop,label:'EYE TOP R'},{idx:LM.rightEyeBot,label:'EYE BOT R'},
  {idx:LM.leftBrowOuter,label:'BROW OUT L'},{idx:LM.leftBrowInner,label:'BROW IN L'},
  {idx:LM.rightBrowOuter,label:'BROW OUT R'},{idx:LM.rightBrowInner,label:'BROW IN R'},
  {idx:LM.noseTip,label:'NOSE TIP'},{idx:LM.noseLeft,label:'NOSE L'},{idx:LM.noseRight,label:'NOSE R'},
  {idx:LM.noseBridge,label:'NOSE BRIDGE'},{idx:LM.lipTop,label:'LIP TOP'},{idx:LM.lipBot,label:'LIP BOT'},
  {idx:LM.lipLeft,label:'LIP LEFT'},{idx:LM.lipRight,label:'LIP RIGHT'},
  {idx:LM.cheekLeft,label:'CHEEK L'},{idx:LM.cheekRight,label:'CHEEK R'},
  {idx:LM.foreheadTop,label:'FOREHEAD'},
];

function computeMetrics(lm){
  const p=i=>({x:lm[i].x,y:lm[i].y});
  const D=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

  // Head tilt compensation
  const le=p(LM.leftEyeOuter),re=p(LM.rightEyeOuter);
  const eyeAngle=Math.atan2(re.y-le.y,re.x-le.x);
  const cosA=Math.cos(-eyeAngle),sinA=Math.sin(-eyeAngle);
  const eyeMid={x:(le.x+re.x)/2,y:(le.y+re.y)/2};
  const rp=i=>{const pt=p(i);const dx=pt.x-eyeMid.x,dy=pt.y-eyeMid.y;return {x:dx*cosA-dy*sinA+eyeMid.x,y:dx*sinA+dy*cosA+eyeMid.y};};

  const faceW=D(rp(LM.jawLeft),rp(LM.jawRight));
  const faceH=D(rp(LM.foreheadTop),rp(LM.chin));

  // JAWLINE: faceH/faceW ratio (square face = higher)
  const fRatio=faceH/faceW;
  const jaw=clamp(Math.round(100-Math.abs(fRatio-1.35)*80),20,96);

  // SYMMETRY: mirror left points across nose-bridge axis
  const nb=rp(LM.noseBridge);
  const pairs=[[LM.leftEyeOuter,LM.rightEyeOuter],[LM.leftEyeInner,LM.rightEyeInner],[LM.leftBrowOuter,LM.rightBrowOuter],[LM.leftBrowInner,LM.rightBrowInner],[LM.noseLeft,LM.noseRight],[LM.lipLeft,LM.lipRight],[LM.jawLeft,LM.jawRight],[LM.cheekLeft,LM.cheekRight]];
  let symTotal=0;
  for(const[l,r]of pairs){const a=rp(l),b=rp(r);symTotal+=Math.abs(b.x-(2*nb.x-a.x));}
  const symNorm=(symTotal/pairs.length)/faceW;
  const sym=clamp(Math.round(100-symNorm*800),25,98);

  // CANTHAL TILT
  const lO=rp(LM.leftEyeOuter),lI=rp(LM.leftEyeInner);
  const rO=rp(LM.rightEyeOuter),rI=rp(LM.rightEyeInner);
  const lEW=D(lO,lI),rEW=D(rO,rI);
  const tR=(((lO.y-lI.y)/lEW)+((rO.y-rI.y)/rEW))/2;
  let cLabel,cScore;
  if(tR<-0.05){cLabel='POSITIVE';cScore=85;}
  else if(tR<0.03){cLabel='NEUTRAL';cScore=72;}
  else{cLabel='NEGATIVE';cScore=48;}

  // CHEEKBONES
  const cheekW=D(rp(LM.cheekLeft),rp(LM.cheekRight));
  const jawW=D(rp(LM.jawMidLeft),rp(LM.jawMidRight));
  const chk=clamp(Math.round(50+(cheekW/jawW-0.9)*55),15,94);

  // EYE REGION
  const lEH=D(rp(LM.leftEyeTop),rp(LM.leftEyeBot));
  const rEH=D(rp(LM.rightEyeTop),rp(LM.rightEyeBot));
  const eR=(lEH/lEW+rEH/rEW)/2;
  const eye=clamp(Math.round(-250*Math.pow(eR-0.3,2)+92),15,94);

  // FACIAL THIRDS
  const browY=(rp(LM.leftBrowInner).y+rp(LM.rightBrowInner).y)/2;
  const t1=browY-rp(LM.foreheadTop).y,t2=rp(LM.noseTip).y-browY,t3=rp(LM.chin).y-rp(LM.noseTip).y;
  const tot=t1+t2+t3,ideal=tot/3;
  const thirdsDev=(Math.abs(t1-ideal)+Math.abs(t2-ideal)+Math.abs(t3-ideal))/tot;
  const thirds=clamp(Math.round(100-thirdsDev*100),35,96);

  // NOSE
  const noseW=D(rp(LM.noseLeft),rp(LM.noseRight));
  const ieW=D(rp(LM.leftEyeInner),rp(LM.rightEyeInner));
  const nRatio=noseW/ieW;
  const nose=clamp(Math.round(100-Math.pow(nRatio-1.1,2)*180),25,96);

  // LIPS
  const upH=D(rp(LM.lipTop),rp(LM.lipUpperMid));
  const loH=D(rp(LM.lipBot),rp(LM.lipLowerMid));
  const lipRatio=upH/(loH+1e-6);
  const lips=clamp(Math.round(100-Math.pow(lipRatio-0.6,2)*380),15,94);

  // FINAL SCORE
  const w=jaw*0.21+sym*0.18+cScore*0.17+chk*0.14+eye*0.12+thirds*0.10+nose*0.05+lips*0.03;
  const score=parseFloat(clamp(w*0.08+1.6,2.0,9.7).toFixed(1));

  return{score,metrics:{jawline:Math.round(jaw),symmetry:Math.round(sym),canthal_tilt:cLabel,cheekbones:Math.round(chk),eye_region:Math.round(eye),facial_thirds:Math.round(thirds),nose:Math.round(nose),lips:Math.round(lips)},raw:{jaw,sym,cScore,chk,eye,thirds,nose,lips},lm};
}

function handleFile(file){
  if(!ready){alert('Wait for ONLINE status.');return;}
  const r=new FileReader();
  r.onload=ev=>{
    uploadedDataURL=ev.target.result;
    $('img').src=uploadedDataURL;
    $('up-sec').style.display='none';
    $('prev-sec').style.display='block';
    $('eb').style.display='none';
  };
  r.readAsDataURL(file);
}

const drop=$('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');const f=e.dataTransfer.files[0];if(f?.type.startsWith('image/'))handleFile(f);});
$('fi').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

$('btn').addEventListener('click',async()=>{
  $('prev-sec').style.display='none';
  $('load-sec').style.display='block';
  $('tlog').innerHTML='';
  $('pb').style.width='0%';
  await runAnalysis();
});

const log=(t,c='w')=>{const d=document.createElement('div');d.className='ln '+c;d.textContent=t;$('tlog').appendChild(d);};
const setP=p=>$('pb').style.width=p+'%';

async function runAnalysis(){
  const imgEl=$('img');
  if(!imgEl.complete||!imgEl.naturalWidth){await new Promise(r=>{imgEl.onload=r;imgEl.onerror=r;});await sleep(50);}
  log('> MEDIAPIPE FACE MESH ACTIVATED.','w');setP(12);await sleep(60);
  log('> SENDING FRAME TO ENGINE...','w');setP(22);
  let results;
  try{results=await detectFace(imgEl);}
  catch(e){return fail('Engine crashed: '+e.message);}
  if(!results.multiFaceLandmarks||results.multiFaceLandmarks.length===0){return fail('Face not detected.\n\nRequirements:\n- clear front-facing photo\n- face takes up >40% of frame\n- good lighting, no shadows\n- no glasses or mask');}
  const lm=results.multiFaceLandmarks[0];
  setP(50);
  log('> FACE FOUND ('+lm.length+' LANDMARKS).','g');await sleep(60);
  log('> LANDMARKS MAPPED - REVIEWING...','w');setP(65);await sleep(60);
  lastLandmarks=lm.map(pt=>({x:pt.x,y:pt.y,z:pt.z||0}));
  originalLandmarks=lm.map(pt=>({x:pt.x,y:pt.y,z:pt.z||0}));
  log('> COMPUTING METRICS...','w');setP(80);await sleep(60);
  log('> SCORE READY.','r');setP(100);await sleep(400);
  $('load-sec').style.display='none';
  showLandmarkMap();
}

function fail(msg){
  $('load-sec').style.display='none';
  $('prev-sec').style.display='block';
  $('eb').textContent='// ERROR: '+msg;
  $('eb').style.display='block';
}

function showLandmarkMap(){
  $('lm-sec').style.display='block';
  const lmImg=$('lm-img');
  lmImg.src=uploadedDataURL;
  const imgWrap=$('lm-img-wrap');
  imgWrap.querySelectorAll('.lm-dot').forEach(el=>el.remove());
  const drawMesh=()=>{
    const canvas=$('lm-canvas');
    const W=imgWrap.clientWidth,H=imgWrap.clientHeight;
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const JAW=[234,93,132,58,172,136,149,148,152,377,378,365,397,288,361,323,454];
    ctx.strokeStyle='rgba(192,57,43,0.35)';ctx.lineWidth=1.5;ctx.beginPath();
    JAW.forEach((i,n)=>{const pt=lastLandmarks[i];n===0?ctx.moveTo(pt.x*W,pt.y*H):ctx.lineTo(pt.x*W,pt.y*H);});
    ctx.stroke();
    ctx.strokeStyle='rgba(0,229,255,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    const nb=lastLandmarks[LM.noseBridge];
    ctx.beginPath();ctx.moveTo(nb.x*W,0);ctx.lineTo(nb.x*W,H);ctx.stroke();
    ctx.setLineDash([]);
  };
  if(lmImg.complete&&lmImg.naturalWidth)renderMap();
  else lmImg.onload=renderMap;
  function renderMap(){
    drawMesh();
    const legend=$('lm-legend');
    legend.innerHTML='';
    KEY_LANDMARKS.forEach(kl=>{
      const li=document.createElement('li');
      li.innerHTML='<span class="dot-indicator"></span>'+kl.label;
      li.dataset.idx=kl.idx;
      legend.appendChild(li);
    });
    updateStats();
    const imgWrapRect=imgWrap.getBoundingClientRect();
    KEY_LANDMARKS.forEach(kl=>{
      const pt=lastLandmarks[kl.idx];
      const px=pt.x*imgWrapRect.width,py=pt.y*imgWrapRect.height;
      const dot=document.createElement('div');
      dot.className='lm-dot';
      dot.dataset.idx=kl.idx;
      dot.style.left=px+'px';
      dot.style.top=py+'px';
      const tooltip=document.createElement('span');
      tooltip.className='lm-tooltip';
      tooltip.textContent=kl.label;
      dot.appendChild(tooltip);
      imgWrap.appendChild(dot);
      let dragging=false;
      const onDown=e=>{e.preventDefault();e.stopPropagation();dragging=true;dot.classList.add('dragging');document.addEventListener('pointermove',onMove);document.addEventListener('pointerup',onUp);highlightLegend(kl.idx,true);};
      const onMove=e=>{
        if(!dragging)return;
        const rect=imgWrap.getBoundingClientRect();
        let px=e.clientX-rect.left,py=e.clientY-rect.top;
        px=clamp(px,0,rect.width);py=clamp(py,0,rect.height);
        dot.style.left=px+'px';dot.style.top=py+'px';
        lastLandmarks[kl.idx]={x:px/rect.width,y:py/rect.height,z:lastLandmarks[kl.idx].z};
        dot.classList.add('corrected');drawMesh();updateLegendItem(kl.idx,true);updateStats();
      };
      const onUp=()=>{dragging=false;dot.classList.remove('dragging');document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);highlightLegend(kl.idx,false);};
      dot.addEventListener('pointerdown',onDown);
    });
    $('lm-sec').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function highlightLegend(idx,on){
  const li=document.querySelector('lm-legend li[data-idx="'+idx+'"]');
  if(!li)return;
  if(on){li.style.background='rgba(0,229,255,.1)';li.style.color='var(--cyan)';}
  else{li.style.background='';li.style.color='';}
}

function updateLegendItem(idx,corrected){
  const li=document.querySelector('lm-legend li[data-idx="'+idx+'"]');
  if(!li)return;
  if(corrected)li.classList.add('corrected');else li.classList.remove('corrected');
}

function updateStats(){
  const correctedCount=lastLandmarks.filter((p,i)=>p.x!==originalLandmarks[i].x||p.y!==originalLandmarks[i].y).length;
  $('lm-stats').innerHTML='<div>Total: <strong>'+KEY_LANDMARKS.length+'</strong></div><div>Corrected: <strong style="color:var(--cyan)">'+correctedCount+'</strong></div>';
}

$('reset-dots-btn').addEventListener('click',()=>{
  if(!originalLandmarks)return;
  lastLandmarks=originalLandmarks.map(p=>({x:p.x,y:p.y,z:p.z}));
  $('lm-img-wrap').querySelectorAll('.lm-dot').forEach(el=>el.remove());
  showLandmarkMap();
});

$('reanalyze-btn').addEventListener('click',()=>{
  $('lm-sec').style.display='none';
  const result=computeMetrics(lastLandmarks);
  const verdict=buildVerdict(result.score,result.metrics,result.raw);
  const tips=buildTips(result.raw);
  renderResults(result,verdict,tips);
});

$('skip-lm-btn').addEventListener('click',()=>{
  $('lm-sec').style.display='none';
  const result=computeMetrics(lastLandmarks);
  const verdict=buildVerdict(result.score,result.metrics,result.raw);
  const tips=buildTips(result.raw);
  renderResults(result,verdict,tips);
});

function buildVerdict(score,m,raw){
  const NM={jaw:'jawline',chk:'cheekbones',eye:'eye region',sym:'symmetry',thirds:'proportions'};
  const ranked=Object.entries({jaw:raw.jaw,chk:raw.chk,eye:raw.eye,sym:raw.sym,thirds:raw.thirds}).sort((a,b)=>a[1]-b[1]);
  const wL=ranked.slice(0,2).map(([k])=>NM[k]);
  const sL=NM[ranked[ranked.length-1][0]];
  const ct={POSITIVE:'Positive canthal tilt - dominant gaze, hunter type.',NEUTRAL:'Neutral canthal tilt - gaze unremarkable.',NEGATIVE:'Negative canthal tilt - passive gaze, prey type.'}[m.canthal_tilt];
  if(score<4.5)return'Weak bone structure. Main issues: <strong>'+wL.join(' and ')+'</strong>. '+ct+' SMV in the lower zone.';
  if(score<5.5)return'Below average. Plus - <strong>'+sL+'</strong>. Minus - <strong>'+wL.join(' and ')+'</strong>. '+ct;
  if(score<6.5)return'Average SMV level. <strong>'+sL+'</strong> is a real plus. Weaknesses: <strong>'+wL.join(' and ')+'</strong>. '+ct+' Starting point, not the finish.';
  if(score<7.5)return'Above average. <strong>'+sL+'</strong> works for you. <strong>'+wL[0]+'</strong> holds you back. '+ct+' Top 25%.';
  if(score<8.5)return'Strong looks. <strong>'+sL+'</strong> at a high level. '+ct+' Top 10%.';
  return'Elite looks. <strong>'+sL+'</strong> - upper percentile level.';
}

const TIPS={jaw:['<strong>BODYFAT DOWN</strong> - face fat kills jawline.','<strong>MEWING</strong> - proper tongue posture shapes the palate.','<strong>BEARD</strong> - covers a weak chin.'],chk:['<strong>BODYFAT DOWN</strong> - cheekbones only show when lean.','<strong>TAN</strong> - reveals cheekbone structure.'],eye:['<strong>BROWS</strong> - proper shape strengthens the orbital region.','<strong>SLEEP 8h+</strong> - removes puffiness, sharper gaze.'],sym:['<strong>CHEW BOTH SIDES</strong> - even muscle load.','<strong>SLEEP ON BACK</strong> - side sleeping deforms the face.'],thirds:['<strong>ORTHODONTICS</strong> - bite shifts proportions.','<strong>MEWING</strong> - affects the middle third long-term.'],nose:['<strong>RHINOPLASTY</strong> - the only way to change the nose.'],lips:['<strong>HYDRATION</strong> - dehydrated lips look thinner.']};

function buildTips(raw){
  const order=Object.entries({jaw:raw.jaw,chk:raw.chk,eye:raw.eye,sym:raw.sym,thirds:raw.thirds,nose:raw.nose,lips:raw.lips}).sort((a,b)=>a[1]-b[1]);
  const res=[],used=new Set();
  for(const[k]of order)for(const t of(TIPS[k]||[]))if(!used.has(t)){used.add(t);res.push(t);if(res.length>=4)return res;break;}
  return res;
}

const getTier=s=>s<4?{l:'SUBHUMAN',c:'#7b1e14'}:s<5?{l:'BELOW AVERAGE',c:'#c0392b'}:s<6?{l:'AVERAGE',c:'#e67e22'}:s<7?{l:'ABOVE AVERAGE',c:'#f1c40f'}:s<8?{l:'HIGH TIER',c:'#27ae60'}:s<9?{l:'CHAD',c:'#00ff41'}:{l:'GIGACHAD',c:'#00ff41'};

function renderResults(result,verdict,tips){
  $('res-sec').style.display='block';
  const{score,metrics,raw}=result;
  $('rid').textContent='LSC-'+(Math.round(score*1000)+metrics.symmetry*10+metrics.jawline);
  $('rd').textContent=new Date().toISOString().slice(0,10);
  const sEl=$('sn');
  sEl.textContent=score.toFixed(1);
  sEl.className='sn '+(score<5?'lo':score<6.5?'mi':score<8?'hi':'tp');
  const{l,c}=getTier(score);
  $('tb').textContent=l;$('tb').style.color=$('tb').style.borderColor=c;
  const DEFS=[{lb:'SYMMETRY',k:'symmetry',u:'%'},{lb:'CANTHAL TILT',k:'canthal_tilt',tx:1},{lb:'JAWLINE',k:'jawline',u:'%'},{lb:'CHEEKBONES',k:'cheekbones',u:'%'},{lb:'EYE REGION',k:'eye_region',u:'%'},{lb:'FACIAL PROPORTIONS',k:'facial_thirds',u:'%'},{lb:'NOSE',k:'nose',u:'%'},{lb:'LIPS',k:'lips',u:'%'}];
  const grid=$('mg');grid.innerHTML='';
  DEFS.forEach(d=>{
    const v=metrics[d.k],cell=document.createElement('div');cell.className='mc';
    if(d.tx){cell.innerHTML='<div class="ml">'+d.lb+'</div><div class="mv">'+v+'</div>';}
    else{const fc=v>=70?'gt':v>=50?'gd':'';cell.innerHTML='<div class="ml">'+d.lb+'</div><div class="mv">'+v+d.u+'</div><div class="mb"><div class="mf '+fc+'" style="width:0%" data-p="'+v+'"></div></div>';}
    grid.appendChild(cell);
  });
  $('vt').innerHTML=verdict;
  $('ll').innerHTML=tips.map(t=>'<li>'+t+'</li>').join('');
  const pot=parseFloat(clamp((100-(raw.jaw+raw.chk+raw.eye)/3)/40,0.5,3.0).toFixed(1));
  $('pn').textContent='+'+pot.toFixed(1);
  setTimeout(()=>{document.querySelectorAll('.mf').forEach(el=>el.style.width=el.dataset.p+'%');$('pf').style.width=Math.min(pot/3*100,100)+'%';},300);
  $('res-sec').scrollIntoView({behavior:'smooth',block:'start'});
}

$('rb').addEventListener('click',()=>{
  $('res-sec').style.display='none';
  $('lm-sec').style.display='none';
  $('lm-img-wrap').querySelectorAll('.lm-dot').forEach(el=>el.remove());
  $('ov').getContext('2d').clearRect(0,0,9999,9999);
  $('up-sec').style.display='block';
  $('fi').value='';
  resolveDetection=null;
  lastLandmarks=null;
  originalLandmarks=null;
});

window.addEventListener('load',()=>{
  if(typeof FaceMesh==='undefined'){$('st').textContent='SCRIPT ERR - refresh';return;}
  initMediaPipe();
});
</script>
